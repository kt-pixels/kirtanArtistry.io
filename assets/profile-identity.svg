      <stop offset="40%" stop-color="#0e1630"/>
      <stop offset="100%" stop-color="#060915"/>
    </radialGradient>
    <linearGradient id="strokeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67dcff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#67dcff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9f84ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

