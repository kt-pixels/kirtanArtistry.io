<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 980" role="img" aria-labelledby="title desc">
  <title id="title">Futuristic profile identity for Kirtan Kaushik</title>
  <desc id="desc">An abstract professional developer portrait with holographic gradients, glass surfaces, and interface overlays.</desc>
  <defs>
    <linearGradient id="frame" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#67dcff"/>
      <stop offset="48%" stop-color="#88ffe0"/>
      <stop offset="100%" stop-color="#9f84ff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="35%" r="52%">
      <stop offset="0%" stop-color="#9ee7ff" stop-opacity="0.95"/>
      <stop offset="52%" stop-color="#55c3ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#090d1d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="20%" r="78%">
